[config]
skip_core_tasks = true
default_to_workspace = false

[tasks.check]
command = "cargo"
args = ["check", "--workspace", "--all-targets"]
env = { "RUSTFLAGS" = "-D warnings" }

[tasks.test]
command = "cargo"
args = ["test", "--workspace"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.fmt]
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt_fix]
command = "cargo"
args = ["fmt", "--all"]

[tasks.bench]
command = "cargo"
args = ["bench", "--workspace", "--exclude", "trustgrant-fuzz"]

[tasks.interop]
command = "cargo"
args = ["test", "--test", "interop", "-p", "trustgrant", "--", "--nocapture"]

[tasks.conformance_vectors]
command = "cargo"
args = ["test", "--test", "conformance_vectors", "-p", "trustgrant", "--", "--nocapture"]

[tasks.conformance_tests]
command = "cargo"
args = ["test", "--test", "conformance", "-p", "trustgrant", "--", "--nocapture"]

[tasks.interop_all]
dependencies = ["interop", "conformance_vectors", "conformance_tests"]

[tasks.fuzz]
command = "cargo"
args = ["check", "-p", "trustgrant-fuzz"]

[tasks.coverage]
command = "cargo"
args = ["tarpaulin",
  "--packages", "trustgrant-domain",
  "--packages", "trustgrant-document",
  "--packages", "trustgrant-error",
  "--packages", "trustgrant-issue",
  "--packages", "trustgrant-evaluate",
  "--packages", "trustgrant-verify",
  "--packages", "trustgrant-ownership",
  "--packages", "trustgrant-discovery",
  "--packages", "trustgrant-revocation",
  "--packages", "trustgrant-ports",
  "--packages", "trustgrant",
  "--skip-clean",
  "--out", "lcov"]

[tasks.smoke]
command = "cargo"
args = ["build", "--release", "--workspace"]
    
[tasks.smoke_examples]
command = "cargo"
args = ["run", "--release", "--example", "canonicalize_cold_path", "--", "100"]

[tasks.smoke_hot_path]
command = "cargo"
args = ["run", "--release", "--example", "evaluate_hot_path", "--", "100000"]

[tasks.smoke_all]
dependencies = ["smoke", "smoke_examples", "smoke_hot_path"]

[tasks.audit]
command = "cargo"
args = ["audit"]

[tasks.wasm]
command = "cargo"
args = ["check", "--target", "wasm32-unknown-unknown", "--workspace", "--exclude", "trustgrant-fuzz"]

[tasks.kani]
command = "cargo"
args = ["kani", "-p", "kani-proofs"]

[tasks.ci]
dependencies = ["check", "clippy", "fmt", "test", "bench", "fuzz", "audit", "interop_all"]

[tasks.publish]
command = "cargo"
args = ["publish", "-p", "trustgrant-error"]
[tasks.publish-domain]
command = "cargo"
args = ["publish", "-p", "trustgrant-domain"]
[tasks.publish-revocation]
command = "cargo"
args = ["publish", "-p", "trustgrant-revocation"]
[tasks.publish-document]
command = "cargo"
args = ["publish", "-p", "trustgrant-document"]
[tasks.publish-discovery]
command = "cargo"
args = ["publish", "-p", "trustgrant-discovery"]
[tasks.publish-ports]
command = "cargo"
args = ["publish", "-p", "trustgrant-ports"]
[tasks.publish-ownership]
command = "cargo"
args = ["publish", "-p", "trustgrant-ownership"]
[tasks.publish-verify]
command = "cargo"
args = ["publish", "-p", "trustgrant-verify"]
[tasks.publish-issue]
command = "cargo"
args = ["publish", "-p", "trustgrant-issue"]
[tasks.publish-evaluate]
command = "cargo"
args = ["publish", "-p", "trustgrant-evaluate"]
[tasks.publish-facade]
command = "cargo"
args = ["publish", "-p", "trustgrant"]
[tasks.publish-all]
dependencies = [
  "publish",
  "publish-domain",
  "publish-revocation",
  "publish-document",
  "publish-discovery",
  "publish-ports",
  "publish-ownership",
  "publish-verify",
  "publish-issue",
  "publish-evaluate",
  "publish-facade",
]
