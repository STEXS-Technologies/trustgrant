name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        run: |
          for crate in \
            trustgrant-error trustgrant-domain trustgrant-revocation \
            trustgrant-document trustgrant-discovery trustgrant-ports \
            trustgrant-ownership trustgrant-verify trustgrant-issue \
            trustgrant-evaluate trustgrant
          do
            echo "Publishing $crate..."
            retries=0
            while true; do
              output=$(cargo publish -p "$crate" 2>&1) && break
              if echo "$output" | grep -q "already exists on crates.io"; then
                echo "  $crate already published, skipping"
                break
              fi
              if echo "$output" | grep -q "429"; then
                retries=$((retries + 1))
                if [ "$retries" -ge 3 ]; then
                  echo "  Rate limited 3 times, giving up on $crate"
                  echo "$output"
                  exit 1
                fi
                echo "  Rate limited, waiting 60s (attempt $retries/3)..."
                sleep 60
                continue
              fi
              echo "$output"
              exit 1
            done
            echo "  Waiting 30s before next crate..."
            sleep 30
          done
          echo "All crates published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
