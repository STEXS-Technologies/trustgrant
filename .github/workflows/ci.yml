name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make clippy

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fmt

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make test

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make bench

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - name: Run tarpaulin
        run: cargo make coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make audit

  fuzz:
    name: Fuzz (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fuzz

  interop:
    name: Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make interop_all

  smoke:
    name: Smoke Test
    needs: [check, clippy, fmt, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make smoke_all

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - check
      - clippy
      - fmt
      - test
      - bench
      - coverage
      - cargo-audit
      - fuzz
      - interop
      - smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - name: Publish crates in dependency order
        run: |
          set -e
          for crate in \
            trustgrant-error trustgrant-domain trustgrant-revocation \
            trustgrant-document trustgrant-discovery trustgrant-ports \
            trustgrant-ownership trustgrant-verify trustgrant-issue \
            trustgrant-evaluate trustgrant
          do
            echo "Publishing $crate..."
            output=$(cargo publish -p "$crate" 2>&1) && continue
            if echo "$output" | grep -q "already exists on crates.io"; then
              echo "  $crate already published, skipping"
              continue
            fi
            echo "$output"
            exit 1
          done
          echo "All crates published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
