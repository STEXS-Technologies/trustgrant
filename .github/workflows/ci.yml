name: CI # updated: rate-limit handling

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make clippy

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fmt

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make test

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make bench

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - name: Run tarpaulin
        run: cargo make coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make audit

  fuzz:
    name: Fuzz (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fuzz

  interop:
    name: Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make interop_all

  smoke:
    name: Smoke Test
    needs: [check, clippy, fmt, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make smoke_all
