name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make check

  clippy:
    name: Clippy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make clippy

  fmt:
    name: Format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fmt

  test:
    name: Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make test

  bench:
    name: Benchmarks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make bench

  coverage:
    name: Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - name: Run tarpaulin
        run: cargo make coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info

  cargo-audit:
    name: Cargo Audit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make audit

  fuzz:
    name: Fuzz (build only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make fuzz

  interop:
    name: Interop
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make interop_all

  smoke:
    name: Smoke Test
    if: github.event_name == 'pull_request'
    needs: [check, clippy, fmt, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - run: cargo make smoke_all

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Publish crates in dependency order
        run: |
          set -e
          for crate in \
            trustgrant-error trustgrant-domain trustgrant-revocation \
            trustgrant-document trustgrant-discovery trustgrant-ports \
            trustgrant-ownership trustgrant-verify trustgrant-issue \
            trustgrant-evaluate trustgrant
          do
            echo "Publishing $crate..."
            while true; do
              output=$(cargo publish -p "$crate" 2>&1) && break
              if echo "$output" | grep -q "already exists on crates.io"; then
                echo "  $crate already published, skipping"
                break
              fi
              if echo "$output" | grep -q "429"; then
                echo "  Rate limited, waiting 60s..."
                sleep 60
                continue
              fi
              echo "$output"
              exit 1
            done
            echo "  Waiting 30s before next crate..."
            sleep 30
          done
          echo "All crates published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
